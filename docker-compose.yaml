services:
  backend:
    build:
      context: ./src/bevietnam/backend
      dockerfile: Dockerfile
    container_name: bevietnam-backend
    volumes:
      - ./src/bevietnam/backend/app:/app/src/bevietnam/backend/app
      - ./data:/app/data:ro
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://bevietnam:bevietnam@postgres-db:5432/bevietnam}
      # AI Core runs locally outside Docker — reachable via host.docker.internal
      AI_CORE_BASE_URL: http://host.docker.internal:8001
      AI_CORE_USE_MOCK: "false"
      AI_CORE_TIMEOUT: "300"
      QUESTION_POOL_PATH: /app/data/question_pool.json
      GOONG_API_KEY: ${GOONG_API_KEY:-}
      GOONG_BASE_URL: ${GOONG_BASE_URL:-https://rsapi.goong.io}
      GOONG_TIMEOUT: ${GOONG_TIMEOUT:-10}
    ports:
      - "8000:8000"
    depends_on:
      - postgres-db
    networks:
      - bevietnam-network

  web:
    image: node:22-alpine
    container_name: bevietnam-web
    working_dir: /app
    volumes:
      - ./src/bevietnam/web:/app
      - web_node_modules:/app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - bevietnam-network

  postgres-db:
    image: postgres:15-alpine
    container_name: bevietnam-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bevietnam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bevietnam}
      POSTGRES_DB: ${POSTGRES_DB:-bevietnam}
    ports:
      - "4000:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bevietnam-network

  # AI Core — chạy ngoài Docker bằng lệnh bên dưới, không build trong compose
  # PYTHONPATH=. uvicorn src.bevietnam.ai.main:app --host 0.0.0.0 --port 8001

  # Seed Qdrant Cloud với 32 docs văn hóa (chạy 1 lần)
  # PYTHONPATH=. python src/bevietnam/scripts/seed_qdrant.py

networks:
  bevietnam-network:
    driver: bridge

volumes:
  postgres_data:
  web_node_modules:
